[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B008"]

[tool.ruff.lint.per-file-ignores]
"tests/conftest.py" = ["E402", "I001"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["backend"]
cache_dir = ".pytest_cache"
addopts = "-q"
